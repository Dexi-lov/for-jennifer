<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For You, Jennifer 💖</title>
    <style>
        :root {
            --card-bg: rgba(26, 22, 54, 0.85);
            --text-main: #ffffff;
            --text-muted: #a19bb0;
            --accent: #ff4b72;
            --bg-color-1: #0b0c10;
            --bg-color-2: #15102a;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
            color: var(--text-main);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden; /* Bloquea cualquier scroll horizontal en la página */
            user-select: none;
            transition: background 1.5s ease-in-out;
            zoom: 125%; /* Zoom general de la página solicitado */
        }

        /* --- MODO ROMÁNTICO (EFECTOS DE ALTO IMPACTO) --- */
        body.romantic-mode {
            --bg-color-1: #2a0815;
            --bg-color-2: #1a0515;
            animation: bgPulse 3s infinite alternate ease-in-out;
        }

        @keyframes bgPulse {
            0% { background: linear-gradient(135deg, #2a0815 0%, #15051a 100%); }
            100% { background: linear-gradient(135deg, #42061b 0%, #290620 100%); }
        }

        body.romantic-mode .player-container {
            box-shadow: 0 0 50px rgba(255, 75, 114, 0.6);
            border-color: rgba(255, 75, 114, 0.5);
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.03); }
            30% { transform: scale(1); }
            45% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        body.romantic-mode .lyric-line.active {
            font-size: 1.6rem;
            color: #ffb3c6;
            text-shadow: 0 0 20px #ff4b72, 0 0 40px #ff4b72, 0 0 60px #ff4b72;
            transform: scale(1.15);
        }

        /* --- Animaciones Ambientales --- */
        .star {
            position: fixed;
            background-color: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        .heart {
            position: fixed;
            font-size: 2rem;
            color: #ff4b5c;
            animation: floatUp 2s ease-out forwards;
            pointer-events: none;
            z-index: 20;
            text-shadow: 0 0 10px rgba(255, 75, 114, 0.8);
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
            100% { opacity: 0; transform: translateY(-150px) scale(1.5) rotate(20deg); }
        }

        @keyframes twinkle {
            0% { opacity: 0.2; }
            50% { opacity: 0.8; }
            100% { opacity: 0.2; }
        }

        /* --- Reproductor UI --- */
        header { text-align: center; margin-top: 30px; padding: 0 20px; z-index: 10; }
        header h1 { font-size: 1.8rem; margin-bottom: 5px; text-shadow: 0 0 10px rgba(255, 75, 114, 0.5); transition: text-shadow 1s; }
        header p { color: var(--accent); font-size: 1rem; margin: 0; font-weight: 500; }

        .player-container {
            background-color: var(--card-bg);
            backdrop-filter: blur(10px);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            text-align: center;
            margin-top: 20px;
            z-index: 10;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 1s ease;
        }

        .track-info h2 { font-size: 1.4rem; margin: 10px 0 5px 0; }
        .track-info h3 { font-size: 1rem; color: var(--text-muted); margin: 0 0 15px 0; font-weight: 400; }

        /* Barras de Rango */
        input[type="range"] {
            -webkit-appearance: none; appearance: none;
            height: 5px; border-radius: 5px;
            background: rgba(255, 255, 255, 0.1); outline: none; cursor: pointer; z-index: 15;
            transition: background 1s;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none;
            width: 14px; height: 14px; border-radius: 50%;
            background: var(--accent); cursor: pointer; transition: transform 0.1s, box-shadow 0.3s;
        }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }
        
        body.romantic-mode input[type="range"]::-webkit-slider-thumb {
            box-shadow: 0 0 15px var(--accent);
        }

        .progress-container {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 20px; gap: 10px; font-size: 0.85rem; color: var(--text-muted);
        }
        #progress-bar { flex: 1; }

        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; margin-bottom: 20px; }
        .btn {
            background: none; border: none; color: var(--text-main); font-size: 1.8rem;
            cursor: pointer; transition: transform 0.2s, color 0.2s, text-shadow 0.3s; z-index: 15;
        }
        .btn:hover { color: var(--accent); transform: scale(1.1); }
        .btn-main { font-size: 2.8rem; color: var(--accent); }
        .btn-main:hover { color: var(--text-main); }
        
        body.romantic-mode .btn-main { text-shadow: 0 0 20px var(--accent); }

        .volume-container {
            display: flex; align-items: center; justify-content: center;
            gap: 10px; color: var(--text-muted); font-size: 1.2rem;
            padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.05);
        }
        #volume-bar { width: 60%; }

        /* --- Letras y Scroll --- */
        .lyrics-container {
            width: 95%; /* Ligeramente más ancho */
            max-width: 600px;
            height: 380px; /* Mucho más grande verticalmente */
            margin-top: 15px;
            overflow: hidden; /* CERO BARRAS DE SCROLL estrictamente */
            position: relative; 
            text-align: center;
            mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, white 15%, white 85%, transparent 100%);
            z-index: 10;
        }
        
        .lyrics-wrapper {
            position: absolute; width: 100%; 
            top: 150px; /* Ajuste para iniciar centrado en la nueva caja de 380px */
            transition: transform 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }
        
        .lyric-line {
            font-size: 1.2rem; padding: 10px 20px; color: var(--text-muted);
            transition: color 0.5s, transform 0.5s, font-size 0.5s, text-shadow 0.5s;
            opacity: 0.4; transform: scale(0.95);
        }
        
        .lyric-line.active {
            color: var(--text-main); opacity: 1; font-weight: 600;
            transform: scale(1.05); text-shadow: 0 0 15px rgba(255, 75, 114, 0.6);
        }

        .footer-note {
            margin-top: auto; margin-bottom: 20px; font-size: 0.85rem;
            color: var(--text-muted); text-align: center; padding: 10px; z-index: 10;
        }
    </style>
</head>
<body>

    <header>
        <h1>Our Special Playlist</h1>
        <p>For my beautiful Jennifer 💖</p>
    </header>

    <div class="player-container">
        <div class="track-info">
            <h2 id="track-title">Loading...</h2>
            <h3 id="track-artist"></h3>
        </div>

        <div class="progress-container">
            <span id="current-time">0:00</span>
            <input type="range" id="progress-bar" min="0" max="100" value="0">
            <span id="duration">0:00</span>
        </div>

        <div class="controls">
            <button class="btn" id="prev-btn">⏮</button>
            <button class="btn btn-main" id="play-btn">▶</button>
            <button class="btn" id="next-btn">⏭</button>
        </div>

        <div class="volume-container">
            <span id="vol-icon" class="btn" style="font-size: 1.2rem;">🔉</span>
            <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="0.7">
        </div>
    </div>

    <div class="lyrics-container">
        <div class="lyrics-wrapper" id="lyrics-wrapper"></div>
    </div>

    <div class="footer-note">
        Tap anywhere to send a little love. You are doing amazing! ✨
    </div>

    <audio id="audio-player"></audio>

    <script>
        // --- SISTEMA DE PARTÍCULAS ---
        let autoHeartInterval = null;

        function createStars() {
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.width = `${Math.random() * 3}px`;
                star.style.height = star.style.width;
                star.style.left = `${Math.random() * 100}vw`;
                star.style.top = `${Math.random() * 100}vh`;
                star.style.animationDuration = `${Math.random() * 3 + 2}s`;
                document.body.appendChild(star);
            }
        }

        function createHeart(x, y) {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '💖';
            heart.style.left = `${x - 15}px`; 
            heart.style.top = `${y - 15}px`;
            
            if(document.body.classList.contains('romantic-mode')) {
                const scale = 1 + (Math.random() * 0.8);
                heart.style.fontSize = `${2 * scale}rem`;
            }

            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 2000);
        }

        document.body.addEventListener('click', (e) => {
            if (!e.target.closest('.controls, #progress-bar, #volume-bar, #vol-icon')) {
                createHeart(e.clientX, e.clientY);
            }
        });

        function startRomanticMode() {
            if (!document.body.classList.contains('romantic-mode')) {
                document.body.classList.add('romantic-mode');
                
                if (!autoHeartInterval) {
                    autoHeartInterval = setInterval(() => {
                        const randomX = Math.random() * window.innerWidth;
                        const randomY = (Math.random() * window.innerHeight) + window.innerHeight * 0.2;
                        createHeart(randomX, randomY);
                    }, 300);
                }
            }
        }

        function stopRomanticMode() {
            if (document.body.classList.contains('romantic-mode')) {
                document.body.classList.remove('romantic-mode');
                clearInterval(autoHeartInterval);
                autoHeartInterval = null;
            }
        }

        // --- BASE DE DATOS DE PLAYLIST ---
        const playlist = [
            { 
                title: "her", 
                artist: "JVKE", 
                url: "./songs/her.mp3", 
                romanticStart: 60.0, 
                romanticEnd: 87.0,   
                lyrics: [
                    { time: 0, text: "🎵 (Escuchando nuestra canción...) 🎵" },
                    { time: 60.0, text: "I've run for many miles trying to find love" },
                    { time: 62.5, text: "From a woman that could love me and never leave my side" },
                    { time: 65.0, text: "And I've run for many miles trying to get away from" },
                    { time: 67.5, text: "The things I'm afraid of and everything inside (and everything inside)" },
                    { time: 71.0, text: "You say that we're already done (done)" },
                    { time: 73.0, text: "But what does that even mean?" },
                    { time: 75.0, text: "You tell me to open my eyes" },
                    { time: 77.0, text: "Thank God it was just a dream" },
                    { time: 80.0, text: "I guess that's how you know that it's love" },
                    { time: 82.5, text: "When you're scared to death they'll leave" },
                    { time: 85.0, text: "Just say that you'll never leave, never leave" },
                    { time: 87.0, text: "🎵 ... 🎵" }
                ] 
            },
            { 
                title: "Lover Girl", 
                artist: "Laufey", 
                url: "./songs/lover_girl.mp3",
                romanticStart: 113.0, 
                romanticEnd: 153.0,   
                lyrics: [
                    { time: 0, text: "🎵 (Disfrutando tu voz...) 🎵" },
                    { time: 113.0, text: "Think I see you in the wings" },
                    { time: 116.0, text: "God, I'm hallucinating" },
                    { time: 119.0, text: "What a reckless fever" },
                    { time: 122.5, text: "Lovestruck girl, I'd tease her" },
                    { time: 126.5, text: "Thought I'd never be her" },
                    { time: 130.5, text: "Quite the job you've done on me, sir" },
                    { time: 135.0, text: "You've been hosting parties in my mind" },
                    { time: 139.0, text: "I'm working overtime" },
                    { time: 143.0, text: "You've become my whole world" },
                    { time: 147.0, text: "Oh, what a curse it is to be a lover girl" },
                    { time: 153.0, text: "🎵 ... 🎵" }
                ]
            },
            { 
                title: "Lo Que Siento", 
                artist: "Cuco", 
                url: "./songs/lo_que_siento.mp3",
                romanticStart: 68.0, 
                romanticEnd: 102.0,  
                lyrics: [
                    { time: 0, text: "🎵 (Sintiendo la vibra...) 🎵" },
                    { time: 68.0, text: "I found my perfect girl, I wanna make you my queen" },
                    { time: 72.0, text: "Time and time again I can be feeling real sad" },
                    { time: 75.5, text: "'Cause mi sueño no se ha hecho una realidad" },
                    { time: 79.5, text: "Pero el tiempo dirá, el tiempo dirá" },
                    { time: 83.0, text: "If we go spend our lives together en lo que el mundo gira" },
                    { time: 87.0, text: "I promise I don't want nobody else to be around me but you" },
                    { time: 91.0, text: "And nobody's touch and nobody's lips can make me feel like yours do" },
                    { time: 95.0, text: "Our hands in a lock, nuestros labios se conocen" },
                    { time: 98.5, text: "Nuestra noche es corta pero hermosa, we'll be okay" },
                    { time: 102.0, text: "🎵 ... 🎵" }
                ]
            },
            { 
                title: "Buena Mezcla", 
                artist: "Piter-G", 
                url: "./songs/buena_mezcla.mp3",
                romanticStart: 47.0, 
                romanticEnd: 71.0,   
                lyrics: [
                    { time: 0, text: "🎵 (Preparando la rima...) 🎵" },
                    { time: 47.0, text: "Desde que te conocí todo me sabe mejor" },
                    { time: 52.0, text: "Tú me tienes medio loco, loco, loquito de amor" },
                    { time: 57.5, text: "Y si te vienes otra vez (Ven, ven) a poner mi vida en color (Yeah-yeah)" },
                    { time: 64.0, text: "Voy a tenerte que nombrar dueña de mi corazón" },
                    { time: 71.0, text: "🎵 ... 🎵" }
                ]
            }
        ];

        const state = {
            songIndex: 0,
            isPlaying: false,
            currentLyricIndex: -1 
        };

        const els = {
            audio: document.getElementById('audio-player'),
            title: document.getElementById('track-title'),
            artist: document.getElementById('track-artist'),
            playBtn: document.getElementById('play-btn'),
            prevBtn: document.getElementById('prev-btn'),
            nextBtn: document.getElementById('next-btn'),
            lyricsWrapper: document.getElementById('lyrics-wrapper'),
            progressBar: document.getElementById('progress-bar'),
            currentTime: document.getElementById('current-time'),
            duration: document.getElementById('duration'),
            volumeBar: document.getElementById('volume-bar'),
            volIcon: document.getElementById('vol-icon')
        };

        els.audio.volume = els.volumeBar.value;

        const formatTime = (seconds) => {
            if (isNaN(seconds)) return "0:00";
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        };

        function loadSong(index) {
            const song = playlist[index];
            state.songIndex = index;
            state.currentLyricIndex = -1;
            
            els.title.textContent = song.title;
            els.artist.textContent = song.artist;
            els.audio.src = song.url;
            
            els.progressBar.value = 0;
            els.currentTime.textContent = "0:00";
            stopRomanticMode(); 
            
            els.lyricsWrapper.innerHTML = '';
            
            song.lyrics.forEach((line, i) => {
                const lineElement = document.createElement('div');
                lineElement.classList.add('lyric-line');
                lineElement.id = `line-${i}`;
                lineElement.textContent = line.text;
                els.lyricsWrapper.appendChild(lineElement);
            });
            
            // Alineación inicial del texto
            els.lyricsWrapper.style.transform = `translateY(150px)`;
        }

        function updateActiveLyricUI() {
            const song = playlist[state.songIndex];
            if (state.currentLyricIndex < 0 || state.currentLyricIndex >= song.lyrics.length) return;

            const prevActive = document.querySelector('.lyric-line.active');
            if (prevActive) prevActive.classList.remove('active');

            const activeLine = document.getElementById(`line-${state.currentLyricIndex}`);
            if (activeLine) {
                activeLine.classList.add('active');
                
                // ACTUALIZADO PARA CONCUERDAR CON CSS (.lyrics-container height = 380)
                const containerHeight = 380;
                const scrollPosition = (containerHeight / 2) - activeLine.offsetTop - (activeLine.offsetHeight / 2);
                els.lyricsWrapper.style.transform = `translateY(${scrollPosition}px)`;
            }
        }

        els.audio.addEventListener('timeupdate', () => {
            const time = els.audio.currentTime;
            const song = playlist[state.songIndex];
            
            if (song.romanticStart && time >= song.romanticStart && time <= song.romanticEnd) {
                startRomanticMode();
            } else {
                stopRomanticMode();
            }

            if (!song.lyrics.length) return;
            let indexChanged = false;

            while (state.currentLyricIndex + 1 < song.lyrics.length && time >= song.lyrics[state.currentLyricIndex + 1].time) {
                state.currentLyricIndex++;
                indexChanged = true;
            }

            while (state.currentLyricIndex >= 0 && time < song.lyrics[state.currentLyricIndex].time) {
                state.currentLyricIndex--;
                indexChanged = true;
            }

            if (indexChanged) updateActiveLyricUI();

            els.currentTime.textContent = formatTime(time);
            els.progressBar.value = time;
        });

        els.audio.addEventListener('loadedmetadata', () => {
            els.duration.textContent = formatTime(els.audio.duration);
            els.progressBar.max = els.audio.duration;
        });

        els.progressBar.addEventListener('input', () => {
            els.audio.currentTime = els.progressBar.value;
            if(!state.isPlaying) els.currentTime.textContent = formatTime(els.progressBar.value);
        });

        els.volumeBar.addEventListener('input', () => {
            els.audio.volume = els.volumeBar.value;
            if (els.audio.volume === 0) {
                els.volIcon.textContent = '🔇';
            } else if (els.audio.volume < 0.5) {
                els.volIcon.textContent = '🔉';
            } else {
                els.volIcon.textContent = '🔊';
            }
        });

        els.volIcon.addEventListener('click', () => {
            if (els.audio.volume > 0) {
                els.audio.dataset.lastVol = els.audio.volume;
                els.volumeBar.value = 0;
                els.audio.volume = 0;
                els.volIcon.textContent = '🔇';
            } else {
                const restoreVol = els.audio.dataset.lastVol || 0.7;
                els.volumeBar.value = restoreVol;
                els.audio.volume = restoreVol;
                els.volIcon.textContent = restoreVol < 0.5 ? '🔉' : '🔊';
            }
        });

        async function togglePlay() {
            if (state.isPlaying) {
                els.audio.pause();
                els.playBtn.textContent = '▶';
                state.isPlaying = false;
            } else {
                try {
                    await els.audio.play();
                    els.playBtn.textContent = '⏸';
                    state.isPlaying = true;
                } catch (error) {
                    console.log("Reproducción interrumpida.");
                }
            }
        }

        async function changeTrack(step) {
            let nextIndex = state.songIndex + step;
            if (nextIndex >= playlist.length) nextIndex = 0;
            if (nextIndex < 0) nextIndex = playlist.length - 1;
            
            loadSong(nextIndex);
            
            if (state.isPlaying) {
                try { await els.audio.play(); } 
                catch (error) { console.log("Audio bloqueado intencionalmente."); }
            }
        }

        els.playBtn.addEventListener('click', togglePlay);
        els.nextBtn.addEventListener('click', () => changeTrack(1));
        els.prevBtn.addEventListener('click', () => changeTrack(-1));
        els.audio.addEventListener('ended', () => changeTrack(1));

        initVisuals();
        createStars();
        loadSong(0);
    </script>
</body>
</html>
